{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — ISI Gestion Pédagogique</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'core/css/base.css' %}" />

  <style>
    body {
      background: var(--sidebar-bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .login-logo-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: #0f172a;
      flex-shrink: 0;
    }

    .login-logo-text { line-height: 1.2; }

    .login-logo-name {
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
    }

    .login-logo-sub {
      font-size: 11px;
      font-weight: 600;
      color: var(--sidebar-text);
      text-transform: uppercase;
      letter-spacing: 1px;
      display: block;
    }

    .login-card {
      background: var(--card-bg);
      border-radius: 14px;
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .login-card-header {
      padding: 28px 32px 0;
    }

    .login-card-title {
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .login-card-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin: 0 0 24px;
    }

    .login-card-body { padding: 0 32px 32px; }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      font-family: var(--font-body);
    }
  </style>
</head>
<body>

<div class="login-wrap fade-up">

  <!-- Logo -->
  <div class="login-logo">
    <div class="login-logo-icon">
      <i class="bi bi-mortarboard-fill"></i>
    </div>
    <div class="login-logo-text">
      <span class="login-logo-name">ISI</span>
      <span class="login-logo-sub">Gestion Pédagogique</span>
    </div>
  </div>

  <!-- Login card -->
  <div class="login-card">
    <div class="login-card-header">
      <h1 class="login-card-title">Connexion</h1>
      <p class="login-card-subtitle">Accédez à votre espace de gestion pédagogique</p>
    </div>

    <div class="login-card-body">

      {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger mb-3" role="alert">
          <i class="bi bi-exclamation-circle-fill"></i>
          <span>{{ message }}</span>
        </div>
        {% endfor %}
      {% endif %}

      <form method="post" novalidate>
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label" for="id_username">Nom d'utilisateur</label>
          <div class="input-icon-wrap">
            <i class="bi bi-person-fill"></i>
            <input
              type="text"
              id="id_username"
              name="username"
              class="form-control"
              placeholder="Entrez votre identifiant"
              autocomplete="username"
              required
              autofocus
            />
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label" for="id_password">Mot de passe</label>
          <div class="input-icon-wrap" id="password-wrap">
            <i class="bi bi-lock-fill"></i>
            <input
              type="password"
              id="id_password"
              name="password"
              class="form-control"
              placeholder="Entrez votre mot de passe"
              autocomplete="current-password"
              required
              style="padding-right:42px;"
            />
            <button type="button" id="togglePassword"
              style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;padding:0;font-size:15px;">
              <i class="bi bi-eye-fill" id="togglePasswordIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-amber w-100" style="justify-content:center;padding:10px 18px;">
          <i class="bi bi-box-arrow-in-right"></i> Se connecter
        </button>
      </form>

    </div>
  </div>

  <div class="login-footer">
    Institut de Sécurité Industrielle &mdash; Plateforme Pédagogique
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const toggleBtn = document.getElementById("togglePassword");
  const passInput = document.getElementById("id_password");
  const icon = document.getElementById("togglePasswordIcon");

  if (toggleBtn) {
    toggleBtn.addEventListener("click", function () {
      if (passInput.type === "password") {
        passInput.type = "text";
        icon.className = "bi bi-eye-slash-fill";
      } else {
        passInput.type = "password";
        icon.className = "bi bi-eye-fill";
      }
    });
  }
</script>
</body>
</html>
